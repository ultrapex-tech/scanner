<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>TCD Scanner App</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f4f4f9;}
      .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 5px; font-weight: bold;}
      button:disabled { background-color: #cccccc; cursor: not-allowed;}
      #downloadBtn { background-color: #2196F3; display: none; margin-top: 10px;}
      #status { margin-top: 15px; font-weight: bold; color: #333; text-align: center; font-size: 14px;}
      .warning { font-size: 12px; color: #d32f2f; margin-bottom: 15px; text-align: center;}
    </style>
  </head>
  <body>
    <div class="container">
      <h2 style="text-align: center; margin-top: 0;">TCD Data Scanner</h2>
      <div class="warning">⚠️ Ensure all Patient PII is cropped out before uploading.</div>
      
      <input type="file" id="imageInput" accept="image/png, image/jpeg" style="margin-bottom: 10px;">
      <button id="uploadBtn" onclick="uploadImage()">Scan and Extract Data</button>
      <div id="status"></div>
      
      <button id="downloadBtn" onclick="downloadJSON()">Download JSON File</button>
    </div>

    <script>
      // *** PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ***
      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxvcxPp0i0dmF3U6tqNxfoa_qvCu1KRhaRGu0CLEjCSjQ6pSgwgqwDbXOcCDWmncj7y3w/exec';

      let currentJsonData = "";

      function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        if (fileInput.files.length === 0) {
          statusDiv.innerText = "Please select an image first.";
          return;
        }

        if (GAS_WEB_APP_URL === 'YOUR_WEB_APP_URL_HERE') {
          statusDiv.innerText = "Developer Error: Please paste your Web App URL into the HTML code.";
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        statusDiv.innerText = "Scanning... This usually takes 5-10 seconds.";
        btn.disabled = true;
        downloadBtn.style.display = 'none';

        reader.onload = async function(e) {
          const base64Data = e.target.result;
          const mimeType = file.type;

          try {
            // Send the image to your Google Apps Script backend
            const response = await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'text/plain;charset=utf-8', // Prevents CORS preflight errors
              },
              body: JSON.stringify({ base64: base64Data, mimeType: mimeType })
            });

            const result = await response.json();

            if (result.status === 'success') {
              statusDiv.innerText = "Success! Data saved to Sheet.";
              currentJsonData = result.data;
              downloadBtn.style.display = 'block';
            } else {
              statusDiv.innerText = "Error: " + result.message;
            }
          } catch (error) {
            statusDiv.innerText = "Network Error: Make sure your Web App URL is correct.";
          } finally {
            btn.disabled = false;
          }
        };

        reader.readAsDataURL(file);
      }

      function downloadJSON() {
        if (!currentJsonData) return;
        const blob = new Blob([currentJsonData], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "TCD_Exam_Data.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
